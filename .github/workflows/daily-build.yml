name: Daily Build CN

on:
  schedule:
    # Backup cron at :45 each hour (external cron at :15 is primary)
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-build-cn
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      # === Start RSSHub Docker container ===
      - name: Start RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub:latest
          echo "Waiting for RSSHub to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:1200 | grep -q "200"; then
              echo "RSSHub is ready!"
              break
            fi
            echo "  Attempt $i: not ready yet..."
            sleep 2
          done
          # Final check
          if ! curl -s -o /dev/null -w "%{http_code}" http://localhost:1200 | grep -q "200"; then
            echo "RSSHub failed to start, continuing with fallback..."
          fi

      - name: Build — fetch RSS, filter, tag, write JSON
        run: node scripts/build.js
        env:
          RSSHUB_BASE: 'http://localhost:1200'
        timeout-minutes: 10

      - name: Bundle data into data.js
        run: node scripts/bundle-data.cjs

      - name: Stop RSSHub
        if: always()
        run: docker stop rsshub 2>/dev/null || true

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ -f
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update news data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
